name: SnipIt
options:
  bundleIdPrefix: com.svrforum
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  developmentLanguage: ko

settings:
  base:
    SWIFT_VERSION: "5.9"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

targets:
  SnipIt:
    type: application
    platform: macOS
    sources:
      - SnipIt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.svrforum.SnipIt
        INFOPLIST_FILE: SnipIt/Info.plist
        CODE_SIGN_ENTITLEMENTS: SnipIt/SnipIt.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: Sparkle
    info:
      path: SnipIt/Info.plist
      properties:
        LSUIElement: true
        CFBundleLocalizations:
          - ko
          - en
        NSScreenCaptureUsageDescription: "화면을 캡처하려면 화면 녹화 권한이 필요합니다."

  SnipItTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SnipItTests
    dependencies:
      - target: SnipIt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.svrforum.SnipIt.tests
        GENERATE_INFOPLIST_FILE: YES
